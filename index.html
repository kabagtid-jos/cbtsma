async function saveMasterDataToDB(k,d){

    const { error } = await db
      .from('master_data')
      .upsert(

}

async function handleLogin(e){
e.preventDefault();const u=$id('username').value.trim(),p=$id('password').value,btn=$id('btn-login-submit'),base=u.split('@')[0].trim();btn.disabled=true;btn.innerHTML='<i class="fas fa-circle-notch fa-spin"></i> Memeriksa...';
try{
let authData=null,detectedRole=null;const roles=['siswa','guru','admin'];
for(const role of roles){const{data,error}=await db.auth.signInWithPassword({email:`${base}@${role}.cbt.com`,password:p});if(!error&&data.user){authData=data;detectedRole=role;break;}}
if(!authData)throw new Error("Invalid login");
state.role=detectedRole;state.user={name:base,authData:authData.user};
await Promise.all([loadMasterDataFromDB(),loadDataSiswaFromDB(),loadDataGuruFromDB(),loadHasilUjianFromDB()]);
if(state.role==='siswa'){const s=state.adminSetup.dataSiswa.find(x=>x.nis===base);state.user.realName=s?(s.nama_lengkap||s.nama||base):base;state.user.kelas=s?s.kelas:'7A';state.view='student-dashboard';}
else if(state.role==='guru'){const g=state.adminSetup.dataGuru.find(x=>x.niy===base);state.user.realName=g?(g.nama||base):base;await loadDaftarSoal();state.view='guru-dashboard';}
else{state.user.realName='Administrator';await loadDaftarSoal();state.view='admin-dashboard';}
render();showToast(`Login berhasil! Selamat datang.`,'success');
}catch(error){showToast("Username atau Password salah!",'error');btn.disabled=false;btn.innerHTML='Masuk <i class="fas fa-arrow-right text-sm ml-1 opacity-80"></i>';}

async function handleTokenConfirmation(e,m){e.preventDefault();const t=$id('input-token-exam').value.toUpperCase(),cL=state.user.kelas||'7A',v=state.tokens[`${m}_${cL}`];if(!v)return showToast(`Token untuk ${m} (${cL}) belum dibuat.`,'error');if(t!==v)return showToast('Token ujian SALAH!','error');const b=$id('btn-submit-token');b.innerHTML='<i class="fas fa-circle-notch fa-spin"></i> Menyiapkan...';b.disabled=true;const isNew=!state.hasilUjian.find(h=>h.mapel===m&&h.nis===state.user.name&&h.status==='mengerjakan');await resumeExam(m,isNew);}

function normalizeQuestionType(jenis){
const t=String(jenis||'').trim().toLowerCase();
return (t==='essay'||t==='esai'||t.includes('essay')||t.includes('esai'))?'essay':'pg';
}
function shuffleArray(arr){
for(let i=arr.length-1;i>0;i--){
const j=Math.floor(Math.random()*(i+1));
[arr[i],arr[j]]=[arr[j],arr[i]];
}
return arr;
}
function serializeCBTQuestions(qs){
return qs.map(q=>({
id:q.id,
type:q.type,
manual:q.manual===true,
answer:q.manual===true?null:q.answer,
is_correct:q.type==='pg'&&q.answer===q.kunci_jawaban,
ragu:q.ragu||false,
options:q.options
}));
}

async function resumeExam(m,iN=false){
state.cbt.activeMapel=m;
let sd=state.adminSetup.dataSiswa.find(s=>s.nis===state.user.name);
if(!sd)sd={nama_lengkap:state.user.realName,kelas:state.user.kelas||'7A'};
try{
if(iN)await db.from('hasil_ujian').insert([{nis:state.user.name,nama_siswa:sd.nama_lengkap,kelas:sd.kelas,mapel:m,status:'mengerjakan'}]);
const{data:sD}=await db.from('soal').select('*').eq('mapel',m).eq('kelas',sd.kelas);
const lS=localStorage.getItem(`cbt_ans_${state.user.name}_${m}`);
const pLS=lS?JSON.parse(lS):null;
const savedById=new Map((pLS||[]).map((x,idx)=>[String(x.id),{...x,_order:idx}]));
const cfg=state.pengaturanUjian.find(p=>p.mapel===m&&p.kelas===sd.kelas)||{acakSoal:true,acakJawaban:true};
if(sD&&sD.length>0){
let qs=sD.map((d,idx)=>{
const saved=savedById.get(String(d.id));
let ans=saved?saved.answer:null;
let ragu=saved?saved.ragu:false;
let savedOpts=saved&&Array.isArray(saved.options)?saved.options:null;
let type=normalizeQuestionType(d.jenis);
let opts=savedOpts||[...(d.opsi_jawaban||[])];
if(type==='pg'&&!savedOpts&&cfg.acakJawaban!==false&&opts.length>0)shuffleArray(opts);
return{
id:d.id,
type,
_originalIndex:idx,
_savedOrder:saved?saved._order:null,
bobot:d.bobot,
text:d.pertanyaan,
gambar:d.gambar_url,
options:opts,
kunci_jawaban:d.kunci_jawaban,
manual:(type==='essay'&&!String(d.kunci_jawaban||'').trim()),
answer:ans,
ragu:ragu||false
};
});
let qsPG=qs.filter(q=>q.type==='pg');
let qsEssay=qs.filter(q=>q.type==='essay');
if(pLS&&pLS.length>0){
const keepSavedOrder=(a,b)=>{
const ao=a._savedOrder!==null?a._savedOrder:Number.MAX_SAFE_INTEGER;
const bo=b._savedOrder!==null?b._savedOrder:Number.MAX_SAFE_INTEGER;
return ao-bo||a._originalIndex-b._originalIndex;
};
qsPG.sort(keepSavedOrder);
qsEssay.sort(keepSavedOrder);
}else if(cfg.acakSoal!==false){
shuffleArray(qsPG);
shuffleArray(qsEssay);
}
qs=[...qsPG,...qsEssay].map(({_originalIndex,_savedOrder,...q})=>q);
localStorage.setItem(`cbt_ans_${state.user.name}_${m}`,JSON.stringify(serializeCBTQuestions(qs)));
state.cbt.questions=qs;
}else showToast('Soal belum ada di database.','info');
}catch(er){console.error(er);}
const jw=state.jadwalUjian.find(x=>x.mapel===m&&x.kelas===sd.kelas);
state.cbt.timeLeft=(jw&&jw.durasi?parseInt(jw.durasi):60)*60;
state.cbt.currentIndex=0;
clearInterval(studentTimerInterval);
state.cbt.hasUnsyncedAnswers=false;
state.view='cbt-exam';
startTimer();
startAutoSync();
render();
}

function attachCBTListeners(){window.onbeforeunload=()=>state.view==='cbt-exam'?"Ujian sedang berlangsung, yakin ingin keluar?":null;}
function saveAnswer(v,doRender=true){const cur=state.cbt.questions[state.cbt.currentIndex];if(isManualEssayQuestion(cur))return;cur.answer=v;const dj=state.cbt.questions.map(q=>({id:q.id,type:q.type,manual:q.manual===true,answer:q.manual===true?null:q.answer,is_correct:q.type==='pg'&&q.answer===q.kunci_jawaban,ragu:q.ragu,options:q.options}));localStorage.setItem(`cbt_ans_${state.user.name}_${state.cbt.activeMapel}`,JSON.stringify(dj));state.cbt.hasUnsyncedAnswers=true;if(doRender)render();}
function persistCurrentVisibleAnswer(doRender=false){const cur=state.cbt.questions[state.cbt.currentIndex];if(!cur||isManualEssayQuestion(cur))return;if(cur.type==='essay'){const el=$id('essay-answer');if(el&&el.value!==cur.answer)saveAnswer(el.value,doRender);}}
function toggleRagu(){state.cbt.questions[state.cbt.currentIndex].ragu=!state.cbt.questions[state.cbt.currentIndex].ragu;saveAnswer(state.cbt.questions[state.cbt.currentIndex].answer);}
function nextQuestion(){persistCurrentVisibleAnswer(false);if(state.cbt.currentIndex<state.cbt.questions.length-1){state.cbt.currentIndex++;render();}}
function prevQuestion(){persistCurrentVisibleAnswer(false);if(state.cbt.currentIndex>0){state.cbt.currentIndex--;render();}}
function jumpToQuestion(idx){persistCurrentVisibleAnswer(false);state.cbt.currentIndex=idx;render();}
function startTimer(){clearInterval(state.cbt.timerInterval);state.cbt.timerInterval=setInterval(()=>{state.cbt.timeLeft--;const d=$id('timer-display');if(d)d.innerText=formatTime(state.cbt.timeLeft);if(state.cbt.timeLeft<=0){clearInterval(state.cbt.timerInterval);finishExam(true);}},1000);}

function confirmSubmit(){
const u=state.cbt.questions.filter(q=>!isManualEssayQuestion(q)&&(q.answer===null||q.answer==='')).length,r=state.cbt.questions.filter(q=>q.ragu).length;let m="Apakah Anda yakin ingin mengakhiri dan mengirim jawaban?";

}

persistCurrentVisibleAnswer(false);
window.onbeforeunload=null;clearInterval(state.cbt.timerInterval);clearInterval(syncInterval);showToast('Menghitung & Mengirim jawaban...','info');

function getQuestionCounts(){const list=state.guruSetup.daftarSoal||[];return{pg:list.filter(s=>s.jenis==='pg').length,essay:list.filter(s=>s.jenis==='essay').length,targetPG:parseInt(state.guruSetup.targetPG)||0,targetEssay:parseInt(state.guruSetup.targetEssay)||0};}
function getQuestionLimitStatus(){const c=getQuestionCounts();return{...c,pgFull:c.targetPG>0&&c.pg>=c.targetPG,essayFull:c.targetEssay>0&&c.essay>=c.targetEssay};}
function getQuestionLimitNoticeHTML(status){const pgCls=status.pgFull?'bg-rose-50 dark:bg-rose-900/20 text-rose-700 dark:text-rose-300 border-rose-200 dark:border-rose-800':'bg-emerald-50 dark:bg-emerald-900/20 text-emerald-700 dark:text-emerald-300 border-emerald-200 dark:border-emerald-800';const esCls=status.essayFull?'bg-rose-50 dark:bg-rose-900/20 text-rose-700 dark:text-rose-300 border-rose-200 dark:border-rose-800':'bg-emerald-50 dark:bg-emerald-900/20 text-emerald-700 dark:text-emerald-300 border-emerald-200 dark:border-emerald-800';return `<div id="limit-warning-box" class="mb-6 grid grid-cols-1 sm:grid-cols-2 gap-3 text-xs sm:text-sm font-bold"><div class="p-3 rounded-xl border ${pgCls}"><i class="fas ${status.pgFull?'fa-triangle-exclamation':'fa-circle-check'} mr-1.5"></i>PG: <span id="prog-pg" class="font-black">${status.pg}</span> / ${status.targetPG} ${status.pgFull?'<span class="ml-2 px-2 py-0.5 rounded-lg bg-rose-100 dark:bg-rose-800/40">BATAS PG PENUH</span>':'<span class="ml-2 opacity-70">Masih bisa tambah</span>'}</div><div class="p-3 rounded-xl border ${esCls}"><i class="fas ${status.essayFull?'fa-triangle-exclamation':'fa-circle-check'} mr-1.5"></i>Essay: <span id="prog-es" class="font-black">${status.essay}</span> / ${status.targetEssay} ${status.essayFull?'<span class="ml-2 px-2 py-0.5 rounded-lg bg-rose-100 dark:bg-rose-800/40">BATAS ESSAY PENUH</span>':'<span class="ml-2 opacity-70">Masih bisa tambah</span>'}</div></div>`;}
function updateProgressUI(){const pP=$id('prog-pg'),pE=$id('prog-es');const status=getQuestionLimitStatus();if(pP)pP.innerText=status.pg;if(pE)pE.innerText=status.essay;const box=$id('limit-warning-box');if(box){const temp=document.createElement('div');temp.innerHTML=getQuestionLimitNoticeHTML(status);box.replaceWith(temp.firstElementChild);}const jenis=$id('input-jenis');if(jenis)toggleOpsiJawaban();}
function validateQuestionLimitBeforeSave(jenis){if(currentEditSoalId)return true;const status=getQuestionLimitStatus();if(jenis==='pg'&&status.pgFull){showToast(`Batas soal PG sudah penuh (${status.pg}/${status.targetPG}). Tidak bisa menambah PG lagi.`,'error');return false;}if(jenis==='essay'&&status.essayFull){showToast(`Batas soal Essay sudah penuh (${status.essay}/${status.targetEssay}). Tidak bisa menambah Essay lagi.`,'error');return false;}return true;}


function closeBuatSoalModal(){const m=$id('buat-soal-modal');if(m)m.remove();render();}

function toggleOpsiJawaban(){
    const jenisEl=$id('input-jenis'),containerOpsi=$id('container-opsi'),containerEssay=$id('container-kunci-essay'),essayInput=$id('input-kunci-essay');
    const j=jenisEl?jenisEl.value:'pg';
    const opsiInputs=['opsi-a','opsi-b','opsi-c','opsi-d'].map(id=>$id(id)).filter(Boolean);
    const radioInputs=Array.from(document.querySelectorAll('input[name="kunci_pg"]'));
    const aiAktif=state.guruSetup.koreksiAIActive!==false;
    const btn=$id('btn-simpan-soal'),status=getQuestionLimitStatus();
    if(btn&&!currentEditSoalId){const blocked=(j==='pg'&&status.pgFull)||(j==='essay'&&status.essayFull);btn.disabled=blocked;btn.classList.toggle('opacity-50',blocked);btn.classList.toggle('cursor-not-allowed',blocked);btn.title=blocked?'Jenis soal ini sudah mencapai batas jumlah yang diatur.':'';}
    if(j==='pg'){
        if(containerOpsi)containerOpsi.classList.remove('hidden');
        if(containerEssay)containerEssay.classList.add('hidden');
        opsiInputs.forEach(el=>{el.disabled=false;el.required=true;});
        radioInputs.forEach((el,idx)=>{el.disabled=false;el.required=idx===0;});
        if(essayInput){essayInput.disabled=true;essayInput.required=false;}
    }else{
        if(containerOpsi)containerOpsi.classList.add('hidden');
        if(containerEssay)containerEssay.classList.toggle('hidden',!aiAktif);
        opsiInputs.forEach(el=>{el.required=false;el.disabled=true;});
        radioInputs.forEach(el=>{el.required=false;el.disabled=true;el.checked=false;});
        if(essayInput){essayInput.disabled=!aiAktif;essayInput.required=false;}
    }
}

function formatText(cmd){document.execCommand(cmd,false,null);$id('input-pertanyaan-editor').focus();}

function resetBuatSoalForm(keepJenis='pg'){
    const jenis=$id('input-jenis');if(jenis)jenis.value=keepJenis||'pg';
    const editor=$id('input-pertanyaan-editor');if(editor)editor.innerHTML='';
    const media=$id('input-media-url');if(media)media.value='';
    ['opsi-a','opsi-b','opsi-c','opsi-d'].forEach(id=>{const el=$id(id);if(el)el.value='';});
    document.querySelectorAll('input[name="kunci_pg"]').forEach(r=>r.checked=false);
    const essay=$id('input-kunci-essay');if(essay)essay.value='';
    toggleOpsiJawaban();
    if(editor)editor.focus();
}

async function prepareSaveSoal(e){
    e.preventDefault();const b=$id('btn-simpan-soal');b.disabled=true;b.innerHTML='Memproses...';
    try{
        const j=$id('input-jenis').value,p=$id('input-pertanyaan-editor').innerHTML;let opsi=null,kunci=null;
        if(!validateQuestionLimitBeforeSave(j))throw new Error('Jumlah soal sudah mencapai batas.');
        if(j==='pg'){
            opsi=[$id('opsi-a').value,$id('opsi-b').value,$id('opsi-c').value,$id('opsi-d').value].map(x=>String(x||'').trim());
            if(opsi.some(x=>!x))throw new Error('Semua opsi jawaban PG harus diisi!');
            const kIdx=document.querySelector('input[name="kunci_pg"]:checked');
            if(!kIdx)throw new Error("Pilih kunci jawaban PG terlebih dahulu!");
            kunci=opsi[parseInt(kIdx.value)];
            if(!kunci)throw new Error('Kunci jawaban PG tidak boleh kosong!');
        }else{
            kunci=$id('input-kunci-essay').value;
        }
        const mediaInput=$id('input-media-url'),imgUrl=mediaInput?mediaInput.value.trim():'';
        const payload={mapel:state.guruSetup.mapel,kelas:state.guruSetup.kelas,jenis:j,pertanyaan:p,opsi_jawaban:opsi,kunci_jawaban:kunci,bobot:j==='pg'?state.guruSetup.bobotPG:state.guruSetup.bobotEssay,gambar_url:imgUrl||null};
        if(currentEditSoalId){
            const{error}=await db.from('soal').update(payload).eq('id',currentEditSoalId);if(error)throw error;
            await catatPembuatSoal({mapel:payload.mapel,kelas:payload.kelas,jumlah:1});
            showToast('Soal diperbarui!','success');
            closeBuatSoalModal();await loadDaftarSoal();render();
        }else{
            const{error}=await db.from('soal').insert([payload]);if(error)throw error;
            await catatPembuatSoal({mapel:payload.mapel,kelas:payload.kelas,jumlah:1});
            showToast('Soal disimpan! Silakan lanjut membuat soal berikutnya.','success');
            await loadDaftarSoal();
            const st=getQuestionLimitStatus();
            const nextJenis=(j==='pg'&&st.pgFull&&!st.essayFull)?'essay':(j==='essay'&&st.essayFull&&!st.pgFull?'pg':j);
            resetBuatSoalForm(nextJenis);
            updateProgressUI();
        }
    }catch(er){showToast('Gagal: '+(er.message||'Unknown'),'error');}finally{if(b){b.disabled=false;b.innerHTML=currentEditSoalId?'Simpan Perubahan':'Simpan & Lanjut';}}
}

}

function tambahWaktuUjian(m,k){
    showPromptModal('Tambah Waktu Ujian',`Tambahan waktu (menit) untuk ${m} Kelas ${k}?`,'15','number',async(menit)=>{
        if(!menit||isNaN(menit)||parseInt(menit)<=0)return;const idx=state.jadwalUjian.findIndex(x=>x.mapel===m&&x.kelas===k);
        if(idx>=0){state.jadwalUjian[idx].durasi=(parseInt(state.jadwalUjian[idx].durasi)||60)+parseInt(menit);await saveMasterDataToDB('jadwal_ujian',state.jadwalUjian);showToast(`Waktu ujian ditambah ${menit} menit`,'success');render();}else{showToast('Jadwal tidak ditemukan','error');}
    });
}

        state.user = { name: base, authData: user };
        await Promise.all([loadMasterDataFromDB(),loadDataSiswaFromDB(),loadDataGuruFromDB(),loadHasilUjianFromDB()]);
        if(state.role==='siswa'){const s=state.adminSetup.dataSiswa.find(x=>x.nis===base);state.user.realName=s?(s.nama_lengkap||s.nama||base):base;state.user.kelas=s?s.kelas:'7A';state.view='student-dashboard';}
        else if(state.role==='guru'){const g=state.adminSetup.dataGuru.find(x=>x.niy===base);state.user.realName=g?(g.nama||base):base;await loadDaftarSoal();state.view='guru-dashboard';}
        else{state.user.realName='Administrator';await loadDaftarSoal();state.view='admin-dashboard';}
        render();
    }
});
</script>
</body>
</html>
